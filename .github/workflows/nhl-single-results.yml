name: NHL Single Result Bot

on:
  workflow_dispatch:
    inputs:
      gamepk:
        description: "Specific NHL gamePk"
        required: false
        default: ""
      date:
        description: "Date in YYYY-MM-DD for autopost/search"
        required: false
        default: ""
      match:
        description: "Matchup, e.g. PIT@WPG or WPG-PIT"
        required: false
        default: ""
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Build env vars
        env:
          INPUT_GAMEPK: ${{ github.event.inputs.gamepk }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_MATCH: ${{ github.event.inputs.match }}
        run: |
          python - << 'PY'
          import os, re

          gp = (os.getenv("INPUT_GAMEPK") or "").strip()
          dt = (os.getenv("INPUT_DATE") or "").strip()
          mt = (os.getenv("INPUT_MATCH") or "").strip()

          q = ""
          if not gp and dt and mt:
              def tri(s):
                  return re.sub(r"\s+", "", s).upper()

              home = away = ""
              if "@" in mt:
                  away, home = [tri(x) for x in mt.split("@", 1)]
              elif "-" in mt:
                  left, right = [tri(x) for x in mt.split("-", 1)]
                  home, away = left, right

              if home and away:
                  q = f"{dt} {home} - {away}"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"GAME_PK={gp}\n")
              fh.write(f"GAME_QUERY={q}\n")
              fh.write(f"TARGET_DATE={dt}\n")

          print("GAME_PK:", gp or "(empty)")
          print("GAME_QUERY:", q or "(empty)")
          print("TARGET_DATE:", dt or "(empty)")
          PY

      - name: Init state
        run: |
          mkdir -p state
          [ -f state/posted_games.json ] || echo '{"posted":{}}' > state/posted_games.json
          cat state/posted_games.json

      - name: Run bot
        env:
          GAME_PK: ${{ env.GAME_PK }}
          GAME_QUERY: ${{ env.GAME_QUERY }}
          TARGET_DATE: ${{ env.TARGET_DATE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          DEBUG_VERBOSE: 1
        run: python nhl_single_result_bot.py

      - name: Show state
        run: |
          git status --porcelain
          echo "--- state file ---"
          cat state/posted_games.json || true

      - name: Commit state
        run: |
          set -e

          if ! git status --porcelain -- state/posted_games.json | grep . >/dev/null; then
            echo "No state changes"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF_NAME:-main}"

          git add -f state/posted_games.json
          git commit -m "Update posted games state" || exit 0

          git fetch origin "$BRANCH" || true
          git pull --rebase origin "$BRANCH" || true
          git push origin "HEAD:$BRANCH"
